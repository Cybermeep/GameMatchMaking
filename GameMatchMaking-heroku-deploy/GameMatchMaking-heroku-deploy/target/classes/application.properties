# =====================================================================
# Server Configuration
# =====================================================================
# ${PORT} is provided automatically by Heroku. The :8080 is the fallback
# for local development.
server.port=${PORT:8080}
server.servlet.session.timeout=30m

# =====================================================================
# Disable Spring Boot's automatic datasource/JPA autoconfiguration.
# This project uses Hibernate directly via HibernateUtil, not Spring JPA.
# If we leave these enabled, Spring tries to create its own connection
# and conflicts with Hibernate's connection.
# =====================================================================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

# =====================================================================
# Steam API Configuration
# These read from environment variables (set in .env locally,
# or in Heroku config vars on the deployed app).
# =====================================================================
steam.api.key=${STEAM_API_KEY}
steam.api.key=${STEAM_API_KEY:1EF14A8B8F66929FFBDAA766B0D19FF2}

steam.api.url=https://api.steampowered.com
steam.oauth.url=https://steamcommunity.com/openid/login
steam.return.url=${APP_URL:http://localhost:8080}/auth/steam/callback

# =====================================================================
# Logging
# =====================================================================
logging.level.edu.isu.gamematch=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG

# =====================================================================
# Export file directory
# =====================================================================
export.directory=/app/exports