<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Group - Game Match Making</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h2 {
            margin-bottom: 12px;
            color: #66c0f4;
        }

        p {
            color: #ccc;
            margin-bottom: 24px;
        }

        a {
            background: #66c0f4;
            color: #1a1a2e;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

            a:hover {
                background: #4aa8d8;
            }

        .error {
            color: #ff8888;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon" th:text="${joined} ? '✅' : '❌'"></div>
        <h2 th:text="${joined} ? 'You joined the group!' : 'Invalid Invite Link'"></h2>
        <p th:classappend="${joined} ? '' : 'error'" th:text="${message}"></p>
        <a href="/dashboard">Go to Dashboard</a>
    </div>
</body>
</html>
