<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Game Match Making</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 36px;
            margin-bottom: 24px;
        }

        h1 {
            color: #66c0f4;
            margin-bottom: 8px;
        }

        .label {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .value {
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .tag {
            display: inline-block;
            background: #0f3460;
            border-radius: 20px;
            padding: 4px 14px;
            margin: 4px;
            font-size: 0.85rem;
            color: #66c0f4;
        }

        .back {
            display: inline-block;
            margin-bottom: 24px;
            color: #66c0f4;
            text-decoration: none;
        }

            .back:hover {
                text-decoration: underline;
            }

        .not-found {
            color: #ff8888;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back">← Back to Dashboard</a>

        <div th:if="${profile == null}" class="card">
            <p class="not-found">User profile not found.</p>
        </div>

        <div th:if="${profile != null}" class="card">
            <h1 th:text="${profile.profileName}">Username</h1>

            <div class="label">Favorite Genres</div>
            <div class="value">
                <span th:if="${profile.favoriteGenres == null or profile.favoriteGenres.empty}"
                      style="color:#aaa;">No genres tagged yet.</span>
                <span th:each="genre : ${profile.favoriteGenres}" class="tag" th:text="${genre}"></span>
            </div>
        </div>
    </div>
</body>
</html>
