# Database Configuration - Oracle Database
spring.datasource.url=jdbc:oracle:thin:@10.110.10.90:1521:oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${ORACLE_USERNAME}
spring.datasource.password=${ORACLE_PASSWORD}

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration
server.port=${PORT:8080}
server.servlet.session.timeout=30m

# Steam API Configuration (unchanged)
steam.api.key=${STEAM_API_KEY:YOUR_STEAM_API_KEY_HERE}
steam.api.url=https://api.steampowered.com
steam.oauth.url=https://steamcommunity.com/openid/login
steam.return.url=${APP_URL:http://localhost:8080}/auth/steam/callback

# Logging
logging.level.edu.isu.gamematch=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN