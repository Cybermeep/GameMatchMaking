services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: gamematch-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-password123}
      ORACLE_DATABASE: XEPDB1
      APP_USER: ${ORACLE_USERNAME:-gamematch_user}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD:-password123}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -s ${ORACLE_USERNAME:-gamematch_user}/${ORACLE_PASSWORD:-password123}@localhost:1521/XEPDB1 <<< 'SELECT 1 FROM dual;' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 120s
    networks:
      - gamematch-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamematch-app
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      ORACLE_HOST: oracle-db
      ORACLE_PORT: 1521
      ORACLE_SERVICE: XEPDB1
      PORT: 8080
    depends_on:
      oracle-db:
        condition: service_healthy
    networks:
      - gamematch-network
    volumes:
      - ./exports:/app/exports
    restart: on-failure

volumes:
  oracle-data:
    name: gamematch-oracle-data

networks:
  gamematch-network:
    name: gamematch-network