# Server Configuration
server.port=${PORT:8080}
server.servlet.session.timeout=30m

# Steam API Configuration
steam.api.key=${STEAM_API_KEY:YOUR_STEAM_API_KEY_HERE}
steam.api.url=https://api.steampowered.com
steam.oauth.url=https://steamcommunity.com/openid/login
steam.return.url=${APP_URL:http://localhost:8080}/auth/steam/callback

# Database Configuration - PostgreSQL for Heroku, fallback to H2 for local
# Heroku will provide JDBC_DATABASE_URL environment variable
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:file:./data/gamematch;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# Auto-detect dialect based on driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=${spring.jpa.database-platform}
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Keep H2 console for local development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.edu.isu.gamematch=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN