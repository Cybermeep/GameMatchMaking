<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Group Calendar</title>
</head>
<body>
    <h1 th:text="'Sessions for ' + ${group.groupName}">Group Calendar</h1>
    <table>
        <tr><th>Date</th><th>Game</th><th>Duration (min)</th></tr>
        <tr th:each="session : ${sessions}">
            <td th:text="${session.scheduledDate}"></td>
            <td th:text="${session.game.gameName}"></td>
            <td th:text="${session.duration}"></td>
        </tr>
    </table>
    <h3>Schedule a new session</h3>
    <form th:action="@{/groups/{id}/sessions/schedule(id=${group.groupID})}" method="post">
        Game: <select name="gameId">
            <option th:each="game : ${group.games}" th:value="${game.gameID}" th:text="${game.gameName}"></option>
        </select><br />
        Date & Time: <input type="datetime-local" name="scheduledDateTime"><br />
        Duration (minutes): <input type="number" name="durationMinutes" min="1"><br />
        <button type="submit">Schedule</button>
    </form>
</body>
</html>
