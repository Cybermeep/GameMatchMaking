<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cast Your Vote</title>
    <style>
        body {
            font-family: 'Segoe UI',sans-serif;
            background: #1b2838;
            color: #c6d4df;
            padding: 20px
        }

        .btn-outline {
            color: #66c0f4;
            border: 1px solid #66c0f4;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block
        }

        .sub-nav {
            margin-bottom: 20px;
            display: flex;
            gap: 8px
        }

        select {
            padding: 8px;
            margin-right: 10px
        }

        button {
            padding: 8px 16px;
            background: #66c0f4;
            color: #111;
            border: none;
            border-radius: 6px;
            cursor: pointer
        }
    </style>
</head>
<body>
    <div class="sub-nav">
        <a th:href="@{/groups/{id}/games(id=${group.groupID})}" class="btn-outline"> Games</a>
        <a th:href="@{/groups/{id}/members(id=${group.groupID})}" class="btn-outline"> Members</a>
        <a th:href="@{/groups/{id}/sessions(id=${group.groupID})}" class="btn-outline"> Sessions</a>
        <a th:href="@{/groups/{id}/achievements(id=${group.groupID})}" class="btn-outline"> Achievements</a>
        <a th:href="@{/groups/{id}/vote(id=${group.groupID})}" class="btn-outline" style="background:#66c0f4;color:#111920;"> Vote</a>
        <a th:href="@{/groups/{id}/home(id=${group.groupID})}" class="btn-outline"> Home</a>
    </div>
    <h1 th:text="'Vote for a game in ' + ${group.groupName}">Vote</h1>
    <p th:if="${group.votingClosed}" style="color:red;">Voting is closed. Results are final.</p>
    <form th:action="@{/groups/{id}/vote(id=${group.groupID})}" method="post" th:unless="${group.votingClosed}">
        <select name="gameId">
            <option th:each="game : ${games}" th:value="${game.gameID}" th:text="${game.gameName} + ' (' + ${game.playtime/60} + ' hrs)'"></option>
        </select>
        <button type="submit">Vote</button>
    </form>
    <!-- Decide Vote button (owner only) -->
    <div th:if="${currentUser.userID == group.groupOwner.userID and !group.votingClosed and games != null and !games.empty}" style="margin-top:10px;">
        <form th:action="@{/groups/{id}/decide-vote(id=${group.groupID})}" method="post">
            <button type="submit" style="background:#ffaa44;color:#111;">Decide Vote Now</button>
        </form>
    </div>
</body>
</html>
