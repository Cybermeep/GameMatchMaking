# ── Database ─────────────────────────────────────────────────
# Heroku sets DATABASE_URL automatically for Postgres add-ons.
# For local Docker, set ORACLE_HOST / ORACLE_PORT / ORACLE_SERVICE in .env
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:oracle:thin:@${ORACLE_HOST:oracle-db}:${ORACLE_PORT:1521}/${ORACLE_SERVICE:XEPDB1}}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${ORACLE_USERNAME}
spring.datasource.password=${ORACLE_PASSWORD}

# ── Hibernate ─────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Connection Pool ───────────────────────────────────────────
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=2
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.session.timeout=30m

# ── Steam ─────────────────────────────────────────────────────
steam.api.key=${STEAM_API_KEY}
steam.api.url=https://api.steampowered.com
steam.oauth.url=https://steamcommunity.com/openid/login
steam.return.url=${APP_URL:http://localhost:8080}/auth/steam/callback

# ── Logging ───────────────────────────────────────────────────
logging.level.edu.isu.gamematch=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.edu.isu.gamematch=DEBUG


# ── Export ────────────────────────────────────────────────────
export.directory=/app/exports
export.max-file-size=5242880

