<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Achievement Comparison</title>
</head>
<body style="background:#1b2838;color:#c6d4df;padding:20px;">
    <a href="/dashboard" style="color:#66c0f4;"> Back to Dashboard</a>
    <h1 th:text="'Achievement comparison for ' + ${group.groupName}">Achievements</h1>
    <table border="1">
        <tr><th>Member</th><th>Achievements</th></tr>
        <tr th:each="entry : ${userAchievements}">
            <td th:text="${entry.key.userProfile.profileName}"></td>
            <td>
                <ul>
                    <li th:each="ach : ${entry.value}" th:text="${ach.achievementName}"></li>
                </ul>
            </td>
        </tr>
    </table>
</body>
</html>
