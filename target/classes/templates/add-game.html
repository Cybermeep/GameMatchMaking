<!DOCTYPE html>
<html>
<head>
    <title>Add Game</title>
</head>
<body style="background:#1b2838;color:#c6d4df;padding:20px;">
    <a href="/dashboard" style="color:#66c0f4;">Back to Dashboard</a>
    <h1>Add Game Manually</h1>
    <form th:action="@{/profile/add-game}" method="post">
        <input type="text" name="gameName" placeholder="Game Name" required>
        <input type="number" name="playtimeMinutes" placeholder="Playtime (min)" min="0">
        <button type="submit">Add</button>
    </form>
</body>
</html>
