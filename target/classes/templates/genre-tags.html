<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Genre Preferences</title>
</head>
<body>
    <h1>Your Genre Preferences</h1>
    <ul>
        <li th:each="genre : ${userGenres}" th:text="${genre}">
            <form th:action="@{/profile/genres/remove}" method="post" style="display:inline">
                <input type="hidden" name="genre" th:value="${genre}">
                <button type="submit">Remove</button>
            </form>
        </li>
    </ul>
    <h2>Add Genre</h2>
    <form th:action="@{/profile/genres/add}" method="post">
        <select name="genre">
            <option th:each="genre : ${availableGenres}" th:value="${genre}" th:text="${genre}"></option>
        </select>
        <button type="submit">Add</button>
    </form>
</body>
</html>
