<!DOCTYPE html>
<html>
<head>
    <title>Login - GameMatch</title>
    <style>
        body {
            font-family: sans-serif;
            background: #1b2838;
            color: #c6d4df;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh
        }

        .box {
            background: #16202d;
            padding: 30px;
            border-radius: 10px
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 250px;
            background: #222;
            color: #c6d4df;
            border: 1px solid #444;
            border-radius: 5px
        }

        button {
            background: #66c0f4;
            color: #111;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer
        }

        a {
            color: #66c0f4
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login</h2>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p th:if="${error}" style="color:red" th:text="${error}"></p>
        <p>Don't have an account? <a href="/register">Register</a></p>
        <p>Or <a href="/auth/steam">Login with Steam</a></p>
    </div>
</body>
</html>
